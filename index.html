<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eve</title>
<script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-pink-50 flex flex-col h-screen"><div class="max-w-2xl mx-auto w-full flex flex-col h-full"><header class="p-4 text-center font-bold text-pink-600 bg-white border-b">
Eve 💕
</header><main id="chat" class="flex-1 p-4 overflow-y-auto flex flex-col gap-2"></main><footer class="p-3 flex gap-2 border-t bg-white">
<input id="input" class="flex-1 border p-2 rounded" placeholder="Talk to Eve...">
<button id="send" class="bg-pink-500 text-white px-4 rounded">Send</button>
</footer></div><script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");

let messages = [];

function render(){
  chat.innerHTML="";
  messages.forEach(m=>{
    const div=document.createElement("div");
    div.className="p-2 rounded max-w-xs "+(m.role==="user"?"ml-auto bg-white":"mr-auto bg-pink-200");
    div.textContent=m.text;
    chat.appendChild(div);
  });
}

send.onclick = () => {
  const text = input.value.trim();
  if(!text) return;

  messages.push({role:"user", text});
  input.value="";
  render();

  setTimeout(()=>{
    messages.push({role:"eve", text:"I’m here… talk to me 💕"});
    render();
  }, 500);
};
</script></body>
</html>
