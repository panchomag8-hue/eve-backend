<!DOCTYPE html>
<html>
<head>
  <title>Eve</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
    }

    #chat {
      padding: 10px;
    }

    .msg {
      margin: 8px 0;
    }

    input {
      width: 80%;
      padding: 10px;
    }

    button {
      padding: 10px;
    }
  </style>
</head>

<body>

  <div id="chat"></div>

  <input id="input" placeholder="Talk to Eve..." />
  <button onclick="sendMessage()">Send</button>

  <script src="/script.js"></script>

  <script>
    function addMessage(sender, text) {
      const div = document.createElement("div");
      div.className = "msg";
      div.innerHTML = `<b>${sender}:</b> ${text}`;
      document.getElementById("chat").appendChild(div);
      return div;
    }
  </script>

</body>
</html>
