<!DOCTYPE html>
<html>
<head>
  <title>Eve</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b10;
      color: white;
    }

    #chat {
      padding: 15px;
      padding-bottom: 80px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      margin: 8px 0;
      border-radius: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .user {
      background: #2b6cff;
      margin-left: auto;
    }

    .eve {
      background: #1b1b24;
      border: 1px solid #2a2a3a;
    }

    input {
      position: fixed;
      bottom: 10px;
      left: 10px;
      width: 75%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1a1a22;
      color: white;
      outline: none;
    }

    button {
      position: fixed;
      bottom: 10px;
      right: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #2b6cff;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="chat"></div>

  <input id="input" placeholder="Talk to Eve..." />
  <button onclick="sendMessage()">Send</button>

  <script>
    let isSending = false;

    function addMessage(sender, text) {
      const div = document.createElement("div");
      div.classList.add("msg");

      if (sender === "You") {
        div.classList.add("user");
        div.innerHTML = text;
      } else {
        div.classList.add("eve");
        div.innerHTML = text;
      }

      document.getElementById("chat").appendChild(div);
      return div;
    }

    function typeMessage(text, element) {
      let i = 0;
      element.innerHTML = "";

      const interval = setInterval(() => {
        element.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
      }, 18);
    }

    async function sendMessage() {
      const input = document.getElementById("input");
      const message = input.value.trim();

      if (!message || isSending) return;

      isSending = true;

      addMessage("You", message);
      input.value = "";

      const loadingBubble = addMessage("Eve", "…");

      try {
        const res = await fetch("/api/eve", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            userId: "pancho"
          })
        });

        const data = await res.json();

        await new Promise(r => setTimeout(r, 700));

        loadingBubble.innerHTML = "";
        typeMessage(data.reply || "…", loadingBubble);

      } catch (err) {
        loadingBubble.innerHTML = "I can't reach you right now… 💔";
      }

      isSending = false;
    }
  </script>

</body>
</html>
