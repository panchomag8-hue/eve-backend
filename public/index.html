<!DOCTYPE html>
<html>
<head>
  <title>Eve AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 15px;
      text-align: center;
      background: #1e1e1e;
      font-size: 20px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 75%;
    }

    .user {
      background: #4caf50;
      align-self: flex-end;
    }

    .eve {
      background: #333;
      align-self: flex-start;
    }

    footer {
      display: flex;
      padding: 10px;
      background: #1e1e1e;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #4caf50;
      color: white;
    }
  </style>
</head>
<body>

<header>Eve 🔥</header>

<div id="chat"></div>

<footer>
  <input id="input" placeholder="Talk to Eve..." />
  <button onclick="send()">Send</button>
</footer>

<script>
async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const text = input.value.trim();
  if (!text) return;

  chat.innerHTML += `<div class="msg user">You: ${text}</div>`;

  input.value = "";

  // typing indicator
  chat.innerHTML += `<div class="msg eve" id="typing">Eve is typing...</div>`;
  chat.scrollTop = chat.scrollHeight;

  const res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  document.getElementById("typing").remove();

  chat.innerHTML += `<div class="msg eve">${data.reply}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
