<!DOCTYPE html>
<html>
<head>
  <title>Eve</title>

      background: #0b0b10;

      padding-bottom: 80px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      margin: 8px 0;
      border-radius: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .user {

    }

    .eve {
      background: #1b1b24;
      border: 1px solid #2a2a3a;
    }

    input {
      position: fixed;
      bottom: 10px;
      left: 10px;
      width: 75%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1a1a22;
      color: white;
      outline: none;
    }

    button {
      position: fixed;
      bottom: 10px;
      right: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #2b6cff;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

        div.classList.add("user");
      } else {
        div.classList.add("eve");
      }

      document.getElementById("chat").appendChild(div);
      return div;
